const EQ_QUESTIONS = [
  { area: "Self-Perception", q: "I know my emotional triggers and can predict how I'll react under pressure." },
  { area: "Self-Perception", q: "I have an honest, clear sense of my strengths — and the gaps I'm still working on." },
  { area: "Self-Expression", q: "I can share how I feel without it undermining how others see my competence." },

  { area: "Decision Making", q: "I use both data and instinct in important decisions — neither one dominates the other." },

  { area: "Stress Management", q: "During sustained pressure, I stay emotionally available and steady for my team." },
  { area: "Stress Management", q: "When things shift unexpectedly, I adapt quickly without becoming reactive." },

const EQ_AREAS = ["Self-Perception", "Self-Expression", "Interpersonal", "Decision Making", "Stress Management"];

const SCALE_LABELS = ["Rarely", "Sometimes", "Half the time", "Often", "Almost always"];

// ─── HELPERS ─────────────────────────────────────────────────

function computeArchetype(styleAnswers) {
  const counts = { A: 0, B: 0, C: 0, D: 0 };
  Object.values(styleAnswers).forEach(v => { if (v) counts[v]++; });
  return Object.entries(counts).sort((a,b) => b[1]-a[1])[0][0];
}

function computeEQScores(eqAnswers) {
  const scores = {};
  EQ_AREAS.forEach(area => { scores[area] = 0; });
  let counts = {};
  EQ_AREAS.forEach(a => counts[a] = 0);
  EQ_QUESTIONS.forEach((q, i) => {
    const val = eqAnswers[i] || 3;
    scores[q.area] += val;
    counts[q.area]++;
  });
  EQ_AREAS.forEach(a => { scores[a] = Math.round((scores[a] / (counts[a] * 5)) * 100); });
  return scores;
}

function RadarChart({ scores, size = 240 }) {
  const cx = size / 2, cy = size / 2;
  const r = size * 0.38;
  const areas = EQ_AREAS;
  const n = areas.length;
  const pts = areas.map((a, i) => {
    const angle = (i / n) * 2 * Math.PI - Math.PI / 2;
    const pct = (scores[a] || 0) / 100;
    return { x: cx + Math.cos(angle) * r * pct, y: cy + Math.sin(angle) * r * pct };
  });
  const gridPts = (frac) => areas.map((_, i) => {
    const angle = (i / n) * 2 * Math.PI - Math.PI / 2;
    return `${cx + Math.cos(angle) * r * frac},${cy + Math.sin(angle) * r * frac}`;
  }).join(' ');
  const labelPts = areas.map((a, i) => {
    const angle = (i / n) * 2 * Math.PI - Math.PI / 2;
    return { x: cx + Math.cos(angle) * (r + 28), y: cy + Math.sin(angle) * (r + 28), label: a };
  });
  const polyPts = pts.map(p => `${p.x},${p.y}`).join(' ');
  return (
    <svg width={size} height={size + 20} viewBox={`0 0 ${size} ${size + 20}`}>
      {[0.25, 0.5, 0.75, 1].map(f => (
        <polygon key={f} points={gridPts(f)} fill="none" stroke="rgba(74,63,159,0.1)" strokeWidth="0.5"/>
      ))}
      {areas.map((_, i) => {
        const angle = (i / n) * 2 * Math.PI - Math.PI / 2;
        return <line key={i} x1={cx} y1={cy} x2={cx + Math.cos(angle)*r} y2={cy + Math.sin(angle)*r} stroke="rgba(74,63,159,0.1)" strokeWidth="0.5"/>;
      })}
      <polygon points={polyPts} fill="rgba(74,63,159,0.18)" stroke="rgba(74,63,159,0.6)" strokeWidth="1.5"/>
      {pts.map((p, i) => <circle key={i} cx={p.x} cy={p.y} r="3" fill="#4a3f9f"/>)}
      {labelPts.map((p, i) => (
        <text key={i} x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle" fontSize="8" fontFamily="'DM Mono',monospace" fill="rgba(74,63,159,0.7)" letterSpacing="0.5">{p.label.toUpperCase()}</text>
      ))}
    </svg>
  );
}

            ].map(s => (
              <div key={s.name} style={{ background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.08)', padding: '4mm', borderRadius: 2 }}>
                <div style={{ fontFamily: "'DM Mono',monospace", fontSize: '0.42rem', letterSpacing: '0.1em', textTransform: 'uppercase', color: '#8b7fd4', marginBottom: '1.5mm' }}>{s.tag}</div>
                <div style={{ fontFamily: "'Century Old Style Std','Playfair Display',serif", fontSize: '0.85rem', fontWeight: 700, color: '#fff', marginBottom: '1.5mm' }}>{s.name}</div>
                <div style={{ fontSize: '0.65rem', fontWeight: 300, color: 'rgba(255,255,255,0.4)', lineHeight: 1.5 }}>{s.desc}</div>
              </div>
            ))}
          </div>
        </div>

        <div style={{ fontSize: '0.7rem', fontWeight: 300, color: '#b8b4cc', lineHeight: 1.7, fontStyle: 'italic' }}>
          This report is based on a self-report diagnostic tool and is intended as a starting point for reflection, not a clinical assessment. The certified EQ-i 2.0 assessment provides a full, validated, and benchmarked profile. Matters is authorised to administer and debrief the EQ-i 2.0 through MHS.
        </div>

        {/* Footer */}
        <div style={{ position: 'absolute', bottom: '8mm', left: '18mm', right: '18mm', borderTop: '1px solid #e5e0f5', paddingTop: '4mm', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span style={{ fontFamily: "'DM Mono',monospace", fontSize: '0.45rem', letterSpacing: '0.12em', color: '#b8b4cc', textTransform: 'uppercase' }}>© 2025 Matters LLC · Sharjah Media City Free Zone, UAE · calendly.com/ysh-coaching/discovery-session</span>
          <span style={{ fontFamily: "'DM Mono',monospace", fontSize: '0.45rem', letterSpacing: '0.12em', color: '#b8b4cc', textTransform: 'uppercase' }}>Page 2 of 2</span>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────
function App() {
  const [step, setStep] = useState('welcome');
  const [name, setName] = useState('');
  const [role, setRole] = useState('');
  const [styleAnswers, setStyleAnswers] = useState({});
  const [eqAnswers, setEqAnswers] = useState({});
  const [showReport, setShowReport] = useState(false);
  const [styleIdx, setStyleIdx] = useState(0);
  const [eqIdx, setEqIdx] = useState(0);

  const totalSteps = STYLE_QUESTIONS.length + EQ_QUESTIONS.length + 3; // name + 2 transitions
  const currentStep =
    step === 'welcome' ? 0 :
    step === 'name' ? 1 :
    step === 'style' ? 2 + styleIdx :
    step === 'eq' ? 2 + STYLE_QUESTIONS.length + eqIdx :
    totalSteps;

  useEffect(() => { window.scrollTo(0, 0); }, [step, styleIdx, eqIdx]);

  const handleStyleAnswer = (val) => {
    const newAnswers = { ...styleAnswers, [styleIdx]: val };
    setStyleAnswers(newAnswers);
    setTimeout(() => {
      if (styleIdx < STYLE_QUESTIONS.length - 1) {
        setStyleIdx(styleIdx + 1);
      } else {
        setStep('eq');
        setEqIdx(0);
      }
    }, 320);
  };

  const handleEQAnswer = (val) => {
    const newAnswers = { ...eqAnswers, [eqIdx]: val };
    setEqAnswers(newAnswers);
    setTimeout(() => {
      if (eqIdx < EQ_QUESTIONS.length - 1) {
        setEqIdx(eqIdx + 1);
      } else {
        setStep('results');
      }
    }, 320);
  };

  if (showReport) {
    const archetype = computeArchetype(styleAnswers);
    const eqScores = computeEQScores(eqAnswers);
    return <Report name={name} role={role} archetype={archetype} eqScores={eqScores}/>;
  }

  const archetype = computeArchetype(styleAnswers);
  const eqScores = computeEQScores(eqAnswers);

  return (
    <div>
      <QuizNav step={step}/>
      {step !== 'welcome' && step !== 'results' && (
        <Progress current={currentStep} total={totalSteps}/>
      )}

      {step === 'welcome' && <WelcomeScreen onStart={() => setStep('name')}/>}
      {step === 'name' && <NameScreen onContinue={(n, r) => { setName(n); setRole(r); setStep('style'); }}/>}
      {step === 'style' && (
        <StyleQuestion
          key={`s${styleIdx}`}
          index={styleIdx}
          total={STYLE_QUESTIONS.length}
          question={STYLE_QUESTIONS[styleIdx]}
          onAnswer={handleStyleAnswer}
          selected={styleAnswers[styleIdx]}
        />
      )}
      {step === 'eq' && (
        <EQQuestion
          key={`eq${eqIdx}`}
          index={eqIdx}
          total={EQ_QUESTIONS.length}
          question={EQ_QUESTIONS[eqIdx]}
          onAnswer={handleEQAnswer}
          selected={eqAnswers[eqIdx]}
        />
      )}
      {step === 'results' && (
        <Results
          name={name} role={role}
          archetype={archetype}
          eqScores={eqScores}
          onGenerateReport={() => setShowReport(true)}
        />
      )}

      {/* Back/forward nav for quiz steps */}
      {(step === 'style' && styleIdx > 0) && (
        <button className="no-print" onClick={() => setStyleIdx(styleIdx - 1)}
          style={{ position: 'fixed', bottom: '2rem', left: '4rem', fontFamily: 'var(--mono)', fontSize: '0.6rem', letterSpacing: '0.15em', textTransform: 'uppercase', color: 'var(--ink-soft)', background: 'transparent', border: 'none', cursor: 'pointer', textDecoration: 'none' }}>
          ← Previous
        </button>
      )}
      {(step === 'eq' && eqIdx > 0) && (
        <button className="no-print" onClick={() => setEqIdx(eqIdx - 1)}
          style={{ position: 'fixed', bottom: '2rem', left: '4rem', fontFamily: 'var(--mono)', fontSize: '0.6rem', letterSpacing: '0.15em', textTransform: 'uppercase', color: 'var(--ink-soft)', background: 'transparent', border: 'none', cursor: 'pointer' }}>
          ← Previous
        </button>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
